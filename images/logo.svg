<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with text -->
  <defs>
    <style>
      .logo-text { font-family: Arial, sans-serif; font-weight: bold; font-size: 18px; }
      .logo-text-outer { fill: #8B3A62; letter-spacing: 2px; }
    </style>
    <path id="topCurve" d="M 20,100 A 80,80 0 0,1 180,100" fill="none"/>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#8B3A62" stroke-width="2"/>
  
  <!-- Curved text around top -->
  <text font-size="16" font-weight="bold" fill="#8B3A62" letter-spacing="3">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">
      EXTREME HIGH SCHOOL NAMAYUMBA
    </textPath>
  </text>
  
  <!-- Deer/Antelope silhouettes -->
  <g id="left-deer">
    <!-- Left antelope -->
    <ellipse cx="45" cy="90" rx="12" ry="18" fill="#B8860B"/>
    <circle cx="40" cy="70" r="8" fill="#B8860B"/>
    <!-- Antlers -->
    <line x1="38" y1="65" x2="32" y2="48" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="65" x2="48" y2="48" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <g id="right-deer">
    <!-- Right antelope -->
    <ellipse cx="155" cy="90" rx="12" ry="18" fill="#B8860B"/>
    <circle cx="160" cy="70" r="8" fill="#B8860B"/>
    <!-- Antlers -->
    <line x1="162" y1="65" x2="168" y2="48" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <line x1="158" y1="65" x2="152" y2="48" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Central shield/book -->
  <ellipse cx="100" cy="85" rx="28" ry="32" fill="#A6472A"/>
  <rect x="90" y="75" width="20" height="20" fill="#8B3A62" opacity="0.8"/>
  
  <!-- Soccer ball -->
  <circle cx="100" cy="115" r="12" fill="#000" opacity="0.3"/>
  <circle cx="100" cy="115" r="10" fill="none" stroke="#FFF" stroke-width="1"/>
  
  <!-- Banner at bottom -->
  <rect x="30" y="150" width="140" height="30" fill="#F5DEB3" stroke="#8B3A62" stroke-width="2"/>
  <text x="100" y="172" font-family="Arial, sans-serif" font-weight="bold" font-size="16" text-anchor="middle" fill="#8B3A62">
    PREPARED TO EXCEL
  </text>
  
  <!-- Sun rays -->
  <circle cx="100" cy="130" r="5" fill="#FFD700"/>
  <line x1="100" y1="120" x2="100" y2="110" stroke="#FFD700" stroke-width="2"/>
  <line x1="107" y1="123" x2="113" y2="117" stroke="#FFD700" stroke-width="2"/>
  <line x1="110" y1="130" x2="120" y2="130" stroke="#FFD700" stroke-width="2"/>
</svg>